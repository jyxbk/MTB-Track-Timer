; ============================================================
;  MTB Downhill Zeitmessung – Stammordner
;
;  Zum Flashen den jeweiligen Unterordner als Projekt öffnen:
;    VSCode → File → Open Folder → MTB_Timer_Node1  (Start)
;    VSCode → File → Open Folder → MTB_Timer_Node2  (Ziel)
;
;  Jeder Unterordner hat sein eigenes platformio.ini.
; ============================================================

[env:info]
platform  = espressif32
board     = heltec_wifi_lora_32_V3
framework = arduino
; Dieser Eintrag ist nur ein Platzhalter – bitte Unterordner öffnen!
