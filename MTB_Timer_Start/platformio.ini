; PlatformIO – START-NODE (v7)
; Diesen Ordner in VSCode öffnen: File → Open Folder → MTB_Timer_Start
; OTA-Firmware: .pio/build/Start/firmware.bin

[platformio]
src_dir = .

[env:Start]
platform      = espressif32
board         = heltec_wifi_lora_32_V3
framework     = arduino
monitor_speed = 115200

lib_deps =
    jgromes/RadioLib @ ^6.6.0
    olikraus/U8g2    @ ^2.35.19
